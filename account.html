<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account Login — Bijamrit</title>
<link rel="stylesheet" href="assets/fonts.css?v=2">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#eef1f1;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#1b1b16;
       display:flex;justify-content:center;padding:24px 16px;-webkit-font-smoothing:antialiased}
  section.screen{width:1180px;max-width:100%;background:#fff;border-radius:6px;
       box-shadow:0 1px 6px rgba(0,0,0,.08);overflow:hidden}
  h1,h2,h3,.serif{font-family:'Instrument Serif',Georgia,serif}
  [data-link]{cursor:pointer}
  [data-link]:hover{opacity:.85}
</style>
</head>
<body>
<section class="screen" data-screen-label="Account / Login">
      <div style="display:grid;grid-template-columns:1fr 1fr;min-height:560px">
        <div style="background:#355a6e url(&quot;assets/img/img-5.webp&quot;) center/cover;position:relative">
          <div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(33,48,58,.85),rgba(53,90,110,.6));padding:48px;display:flex;flex-direction:column;justify-content:space-between;color:#fff">
            <div style="display:flex;align-items:center;gap:7px;font-weight:800;font-size:21px">Bijamrit <span style="font-size:17px">🪶</span></div>
            <div><div style="font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.15">Welcome back<br>to the family.</div><p style="font-size:14px;opacity:.85;margin-top:12px;max-width:300px;line-height:1.6">Track orders, save favourites and unlock member-only festive offers.</p></div>
          </div>
        </div>
        <div style="padding:56px 56px;display:flex;flex-direction:column;justify-content:center">
          <div style="display:flex;gap:24px;border-bottom:1px solid #e4ebec;margin-bottom:28px"><span style="font-size:15px;font-weight:800;padding-bottom:12px;border-bottom:2px solid #355a6e">Log in</span><span style="font-size:15px;font-weight:600;color:#8a8678;padding-bottom:12px">Register</span></div>
          <div style="font-size:12px;font-weight:700;color:#8a8678;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Email</div>
          <div style="border:1px solid #e4e3da;border-radius:12px;padding:14px 16px;font-size:13px;color:#8a8678;margin-bottom:18px">you@email.com</div>
          <div style="font-size:12px;font-weight:700;color:#8a8678;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Password</div>
          <div style="border:1px solid #e4e3da;border-radius:12px;padding:14px 16px;font-size:13px;color:#8a8678;margin-bottom:10px">••••••••</div>
          <div style="text-align:right;font-size:12px;color:#355a6e;font-weight:600;margin-bottom:22px">Forgot password?</div>
          <div style="background:#355a6e;color:#fff;font-size:15px;font-weight:700;padding:15px;border-radius:12px;text-align:center">Log in</div>
          <div style="display:flex;align-items:center;gap:12px;margin:22px 0;color:#a8a496;font-size:12px"><span style="flex:1;height:1px;background:#e4ebec"></span>or continue with<span style="flex:1;height:1px;background:#e4ebec"></span></div>
          <div style="display:flex;gap:12px"><div style="flex:1;border:1px solid #e4e3da;border-radius:12px;padding:12px;text-align:center;font-size:13px;font-weight:600">G  Google</div><div style="flex:1;border:1px solid #e4e3da;border-radius:12px;padding:12px;text-align:center;font-size:13px;font-weight:600">  Apple</div></div>
        </div>
      </div>
    </section>
<script src="assets/store.js?v=2"></script>
<script src="assets/nav.js?v=2"></script>
<script src="assets/app.js?v=2"></script>
</body>
</html>
